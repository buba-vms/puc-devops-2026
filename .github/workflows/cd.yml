name: CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Rodar testes antes do deploy
        run: npm test

      - name: Iniciar servidor e verificar funcionamento
        run: |
          npm start &
          sleep 3
          curl --fail http://localhost:3000/health
